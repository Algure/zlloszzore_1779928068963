    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <style>
        html, body {
          height: 100%;
        }
        body {
          font-family: Arial, sans-serif;
          background: #f4f6fa;

          flex-direction: column;
          align-items: center;
          margin: 0;

        #toolbar {
          display: flex;

          margin-bottom: 10px;
          align-items: center;
        }
        canvas {
          background: white;
          border-radius: 8px;
          cursor: crosshair;
          width: 100vw;
          height: 100vh;
          touch-action: none; /* allow custom gestures without browser interference */
        }
        button, select, input {
          padding: 5px 8px;
          font-size: 14px;
        }
        #topControls {
          position: fixed;
          top: 14px;
          left: 50%;
          transform: translateX(-50%);
          z-index: 120;
          display: flex;
          align-items: center;
          gap: 14px;
          padding: 10px 14px;
          border-radius: 14px;
          border: 1px solid rgba(18, 28, 45, 0.16);
          background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(249,251,255,0.93));
          box-shadow: 0 10px 30px rgba(12, 21, 35, 0.15);
          backdrop-filter: blur(8px);
        }
        #projectNameLabel {
          font-size: 14px;
          font-weight: 700;
          letter-spacing: 0.02em;
          color: #1b2638;
          white-space: nowrap;
        }
        .statePickerWrap {
          display: flex;
          align-items: center;
          gap: 8px;
        }
        .statePickerLabel {
          font-size: 12px;
          font-weight: 600;
          color: #44536b;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }
        #viewDropdown {
          min-width: 140px;
          border: 1px solid #b8c5dc;
          border-radius: 10px;
          padding: 8px 34px 8px 12px;
          font-size: 14px;
          font-weight: 600;
          color: #1f2d44;
          background: linear-gradient(180deg, #ffffff, #f3f7ff);
          box-shadow: 0 1px 2px rgba(21, 34, 54, 0.08);
          cursor: pointer;
          outline: none;
          appearance: none;
          -webkit-appearance: none;
          background-image: linear-gradient(45deg, transparent 50%, #4f678f 50%), linear-gradient(135deg, #4f678f 50%, transparent 50%);
          background-position: calc(100% - 16px) calc(50% - 2px), calc(100% - 11px) calc(50% - 2px);
          background-size: 5px 5px, 5px 5px;
          background-repeat: no-repeat;
        }
        #viewDropdown:hover {
          border-color: #89a0c5;
        }
        #viewDropdown:focus {
          border-color: #3f6fc1;
          box-shadow: 0 0 0 3px rgba(63, 111, 193, 0.18);

        #omiconOverlay {
          position: fixed;
          bottom: 16px;
          right: 16px;
          z-index: 100;
          width: 56px;
          height: 56px;
          pointer-events: none;
          opacity: 0.85;
        }
        @media (max-width: 640px) {
          #topControls {
            width: calc(100% - 24px);
            justify-content: space-between;
            padding: 10px 12px;
          }
          #projectNameLabel {
            max-width: 48%;
            overflow: hidden;
            text-overflow: ellipsis;
          }
          .statePickerLabel {
            display: none;
          }
          #viewDropdown {
            min-width: 124px;
          }
        }
    </style>
</head>

<script>
    const canvas = document.getElementById("canvas");

      // --- Context menu for shapes (right-click) ---
      const shapeContextMenu = document.createElement('div');
      shapeContextMenu.style.position = 'fixed';
      shapeContextMenu.style.background = '#fff';
      shapeContextMenu.style.border = '1px solid #ccc';
      shapeContextMenu.style.boxShadow = '0 2px 8px rgba(0,0,0,0.15)';

      shapeContextMenu.style.display = 'none';
      shapeContextMenu.style.zIndex = 9999;
      shapeContextMenu.style.minWidth = '140px';
      document.body.appendChild(shapeContextMenu);
      let ignoreNextDocClick = false;

      let contextTargetId = null;
      function hideShapeContextMenu() {
        shapeContextMenu.style.display = 'none';
        contextTargetId = null;
      }

      function showShapeContextMenu(x, y, targetId, position = null) {
        contextTargetId = targetId;
        shapeContextMenu.innerHTML = '';
        const mk = (label, cb) => {
          const el = document.createElement('div');
          el.textContent = label;
          el.style.padding = '6px 12px';
          el.style.cursor = 'pointer';
          el.addEventListener('mouseenter', () => el.style.background = '#f3f6fb');

        };
        shapeContextMenu.style.left = x + 'px';
        shapeContextMenu.style.top = y + 'px';

        // Avoid immediate hide from synthetic click following long press
        ignoreNextDocClick = true;
      }

      document.addEventListener('click', (ev) => {
        if (ignoreNextDocClick) {
          ignoreNextDocClick = false;
          return;
        }
        // Don't hide when clicking inside the menu
        if (shapeContextMenu.contains(ev.target)) return;
        hideShapeContextMenu();
      });

    // store shapes in a Map keyed by unique ids for stable lookup and easy updates
    let shapesMap = new Map();
    // zOrder stores shape ids in drawing order (back -> front)
    let zOrder = [];
      let shapeIdCounter = 1;
      let shapeName = '';
      function makeShapeId(type) {
        // compact, unique id: type_timestamp_counter
        const ts = Date.now().toString(36);
        if(shapeName) type = shapeName;
        return `${shapeName}_${ts}_${shapeIdCounter++}`;
      }
      // Z-order manipulation helpers (operate on zOrder array)
      function bringForward(id) {
        const idx = zOrder.indexOf(id);
        if (idx === -1 || idx === zOrder.length - 1) return;
        const item = zOrder.splice(idx, 1)[0];
        zOrder.splice(idx + 1, 0, item);
        drawAll();
        updateDartWidgetOrder();
      }
      function sendBackward(id) {
        const idx = zOrder.indexOf(id);
        if (idx <= 0) return;
        const item = zOrder.splice(idx, 1)[0];
        zOrder.splice(idx - 1, 0, item);
        drawAll();
        updateDartWidgetOrder();
       }
      function bringToFront(id) {
        const idx = zOrder.indexOf(id);
        if (idx === -1 || idx === zOrder.length - 1) return;
        zOrder.splice(idx, 1);
        zOrder.push(id);
        drawAll();
        updateDartWidgetOrder();
       }
      function sendToBack(id) {
        const idx = zOrder.indexOf(id);
        if (idx <= 0) return;
        zOrder.splice(idx, 1);
        zOrder.unshift(id);
        drawAll();
        updateDartWidgetOrder();
      }

      function groupWidgets() {
        let ids = [];
        for (const el of groupSelection) {
          ids.push(el);
        }
        groupSelection.clear();
        selectionRect = null;
        drawAll();
      }

      function deleteInDart(id) {
      }

      let drawing = false;
      let moving = false;
      let panning = false;
      let resizing = false;

      let selectingGroup = false;
      let groupDragging = false;
      let selectionRect = null; // { x, y, w, h } in world coords
      let groupSelection = new Set(); // set of selected shape ids
      let groupOrigPositions = new Map(); // id -> {x,y}
      let groupLastMouse = null;

      let startX, startY, offsetX, offsetY, selectedShape = null;
      let uploadedImage = null;
      // Default image (can be set to a URL or an uploaded file). Stored as an HTMLImageElement.
      let defaultImage = new Image();
      let defaultImageLoaded = false;
      // A simple SVG placeholder as a default image (small, vector so it scales well)
      const defaultImageDataUrl = 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect width="100%" height="100%" fill="#ddd"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#888" font-size="20">Image</text></svg>');
      defaultImage.onload = () => { defaultImageLoaded = true; };
      defaultImage.src = defaultImageDataUrl;

   // Return shapes whose bounding boxes intersect the given rect (world coords)
      function pointInRect(px, py, minX, minY, maxX, maxY) {
        return px >= minX && px <= maxX && py >= minY && py <= maxY;
      }

      // segment-segment intersection (excluding colinear overlap edge cases handled as intersects)
      function segSegIntersects(x1,y1,x2,y2,x3,y3,x4,y4) {
        function orient(ax,ay,bx,by,cx,cy){
          return (bx-ax)*(cy-ay) - (by-ay)*(cx-ax);
        }
        const o1 = orient(x1,y1,x2,y2,x3,y3);
        const o2 = orient(x1,y1,x2,y2,x4,y4);
        const o3 = orient(x3,y3,x4,y4,x1,y1);
        const o4 = orient(x3,y3,x4,y4,x2,y2);
        if (o1 === 0 && pointOnSegment(x1,y1,x2,y2,x3,y3)) return true;
        if (o2 === 0 && pointOnSegment(x1,y1,x2,y2,x4,y4)) return true;
        if (o3 === 0 && pointOnSegment(x3,y3,x4,y4,x1,y1)) return true;
        if (o4 === 0 && pointOnSegment(x3,y3,x4,y4,x2,y2)) return true;
        return (o1 > 0) !== (o2 > 0) && (o3 > 0) !== (o4 > 0);
      }

      function pointOnSegment(x1,y1,x2,y2,px,py){
        const minx = Math.min(x1,x2), maxx = Math.max(x1,x2);
        const miny = Math.min(y1,y2), maxy = Math.max(y1,y2);
        const cross = (px - x1)*(y2 - y1) - (py - y1)*(x2 - x1);
        if (Math.abs(cross) > 1e-6) return false;
        return px >= minx - 1e-6 && px <= maxx + 1e-6 && py >= miny - 1e-6 && py <= maxy + 1e-6;
      }

      function segmentIntersectsRect(sx1,sy1,sx2,sy2,minX,minY,maxX,maxY){
        // If either endpoint inside rect, that's a vertex hit
        if (pointInRect(sx1,sy1,minX,minY,maxX,maxY) || pointInRect(sx2,sy2,minX,minY,maxX,maxY)) return true;
        // Check intersection with each rect edge
        // rect edges: (minX,minY)-(maxX,minY), (maxX,minY)-(maxX,maxY), (maxX,maxY)-(minX,maxY), (minX,maxY)-(minX,minY)
        if (segSegIntersects(sx1,sy1,sx2,sy2, minX,minY, maxX,minY)) return true;
        if (segSegIntersects(sx1,sy1,sx2,sy2, maxX,minY, maxX,maxY)) return true;
        if (segSegIntersects(sx1,sy1,sx2,sy2, maxX,maxY, minX,maxY)) return true;
        if (segSegIntersects(sx1,sy1,sx2,sy2, minX,maxY, minX,minY)) return true;
        return false;
      }

      function circleBoundaryIntersectsRect(cx,cy,r,minX,minY,maxX,maxY){
        // Compute min distance from center to rect (closest point)
        const closestX = Math.max(minX, Math.min(cx, maxX));
        const closestY = Math.max(minY, Math.min(cy, maxY));
        const dxMin = closestX - cx;
        const dyMin = closestY - cy;
        const minDist = Math.sqrt(dxMin*dxMin + dyMin*dyMin);
        // Compute max distance from center to rect corners
        const corners = [[minX,minY],[minX,maxY],[maxX,minY],[maxX,maxY]];
        let maxDist = 0;
        for (const [px,py] of corners){
          const d = Math.hypot(px-cx, py-cy);
          if (d > maxDist) maxDist = d;
        }
        // boundary intersects if radius is between minDist and maxDist (inclusive)
        return (minDist <= r && r <= maxDist);
      }

      function shapeIntersectsByEdgeOrVertex(s, minX, minY, maxX, maxY){
        if (!s) return false;
        if (s.type === 'line'){
          const x1 = s.x, y1 = s.y, x2 = s.x + (s.w || 0), y2 = s.y + (s.h || 0);
          // endpoint vertex check or edge intersects
          return segmentIntersectsRect(x1,y1,x2,y2,minX,minY,maxX,maxY);
        }
        if (s.type === 'circle'){
          const r = Math.max(Math.abs(s.w || 0), Math.abs(s.h || 0)) / 2;
          const cx = s.x + (s.w || 0) / 2;
          const cy = s.y + (s.h || 0) / 2;
          return circleBoundaryIntersectsRect(cx,cy,r,minX,minY,maxX,maxY);
        }
        // rect/text/image: check vertices first
        const x0 = Math.min(s.x, s.x + (s.w || 0));
        const y0 = Math.min(s.y, s.y + (s.h || 0));
        const w = Math.abs(s.w || 0);
        const h = Math.abs(s.h || 0);
        const verts = [[x0,y0],[x0+w,y0],[x0,y0+h],[x0+w,y0+h]];
        for (const [vx,vy] of verts) {
          if (pointInRect(vx,vy,minX,minY,maxX,maxY)) return true;
        }
        // then check edges intersecting selection rect
        // edges are the four sides
        const x1 = x0, y1 = y0, x2 = x0 + w, y2 = y0 + h;
        if (segmentIntersectsRect(x1,y1,x2,y1,minX,minY,maxX,maxY)) return true;
        if (segmentIntersectsRect(x2,y1,x2,y2,minX,minY,maxX,maxY)) return true;
        if (segmentIntersectsRect(x2,y2,x1,y2,minX,minY,maxX,maxY)) return true;
        if (segmentIntersectsRect(x1,y2,x1,y1,minX,minY,maxX,maxY)) return true;
        return false;
      }

      function getShapesInRect(minX, minY, maxX, maxY) {
        const out = [];
        for (let id of zOrder) {
          const s = shapesMap.get(id);
          if (!s) continue;
          if (shapeIntersectsByEdgeOrVertex(s, minX, minY, maxX, maxY)) out.push(s);
        }
        return out;
      }


      // Helpers to change the default image at runtime
      function setDefaultImageFromUrl(url) {
        defaultImageLoaded = false;
        defaultImage = new Image();
        defaultImage.onload = () => { defaultImageLoaded = true; drawAll(); };
        defaultImage.src = url;
      }
      function setDefaultImageFromFile(file) {
        const reader = new FileReader();
        reader.onload = (evt) => {
          setDefaultImageFromUrl(evt.target.result);
        };
        reader.readAsDataURL(file);
      }
      let selectedForParenting = null; // Store shape selected for parenting
      let resizeHandle = null;
      const HANDLE_SIZE = 10;

      // Viewport state
      let viewport = {
        x: 0,
        y: 0,
        zoom: 1,
        minZoom: 0.1,
        maxZoom: 10
      };

      // Make the canvas crisp (high-DPI)
      function getMousePos(canvas, evt) {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const scaleX = (canvas.width / dpr) / rect.width;
        const scaleY = (canvas.height / dpr) / rect.height;
        return {
          x: ((evt.clientX - rect.left) * scaleX - viewport.x) / viewport.zoom,
          y: ((evt.clientY - rect.top) * scaleY - viewport.y) / viewport.zoom
        };
      }

      // Convert world coordinates to screen coordinates
      function worldToScreen(x, y) {
        return {
          x: x * viewport.zoom + viewport.x,
          y: y * viewport.zoom + viewport.y
        };
      }

      // Helper function to update shape position and its children
      function moveShape(shape, newX, newY, shouldUpdate=true) {
        // Calculate the movement delta
        const dx = newX - shape.x;
        const dy = newY - shape.y;

        // Move the shape
        shape.x = newX;
        shape.y = newY;

         updateFlutterWidgetAttr(shape, shouldUpdate);
        // Move all children by the same delta
        shape.children.forEach(child => {
          moveShape(child, child.x + dx, child.y + dy, shouldUpdate);
        });
      }

      function setupSharpCanvas(canvas, ctx) {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset any transforms
        ctx.scale(dpr, dpr);
      }
      setupSharpCanvas(canvas, ctx);

      // Keep canvas crisp on orientation/viewport changes
      window.addEventListener('resize', () => {
        setupSharpCanvas(canvas, ctx);
        drawAll();
      });

      // Pinch-to-zoom state
      let pinchZooming = false;
      let lastPinchDist = 0;
      let pinchCenterScreen = { x: 0, y: 0 };

      // Long-press context menu state
      let longPressTimer = null;
      let longPressActive = false;
      let currentTouchActive = false;
      let longPressStart = { clientX: 0, clientY: 0 };
      let currentTouchPoint = { clientX: 0, clientY: 0 };
      let pendingPointerDown = false; // defer pointerDown for distinguishing tap vs long-press
      const LONG_PRESS_MS = 400;
      const LONG_PRESS_TOLERANCE = 25;
      let suppressNextPointerUp = false;

      function getTextLines(text, maxWidth, ctx) {
        if (!text || maxWidth <= 0) return [];

        const words = text.split(/\s+/);
        if (words.length === 0) return [];

        const lines = [];
        let currentLine = '';

        for (let i = 0; i < words.length; i++) {
          const word = words[i];
          // Handle long words that need breaking
          if (ctx.measureText(word).width > maxWidth) {
            // If we have content in currentLine, push it first
            if (currentLine) {
              lines.push(currentLine);
              currentLine = '';
            }
            // Break the long word into characters
            let partialWord = '';
            for (let char of word) {
              const testLine = partialWord + char;
              if (ctx.measureText(testLine).width > maxWidth) {
                if (partialWord) lines.push(partialWord);
                partialWord = char;
              } else {
                partialWord += char;
              }
            }
            if (partialWord) {
              currentLine = partialWord;
            }
            continue;
          }

          // Try adding the word to current line
          const testLine = currentLine ? currentLine + ' ' + word : word;
          const testWidth = ctx.measureText(testLine).width;

          if (testWidth <= maxWidth) {
            currentLine = testLine;
          } else {
            if (currentLine) lines.push(currentLine);
            currentLine = word;
          }
        }

        // Don't forget the last line
        if (currentLine) {
          lines.push(currentLine);
        }

        return lines;
      }

      canvas.addEventListener('dblclick', e => {
        const pos = getMousePos(canvas, e);
        const clickedShape = getShapeAt(pos.x, pos.y);

        if (clickedShape && clickedShape.type === 'text') {
          const newText = prompt('Edit text:', clickedShape.text);
          if (newText !== null) {
            clickedShape.text = newText;
            drawAll();
          }
        }
      });

      // Right-click context menu on shapes
      canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const pos = getMousePos(canvas, e);
        const shape = getShapeAt(pos.x, pos.y);
        if (!shape) {
          hideShapeContextMenu();
          return;
        }
        // select the shape
        selectedShape = shape;
        // show menu at mouse screen coords
        showShapeContextMenu(e.clientX, e.clientY, shape._id, pos);
      });


      // Add mouse wheel zoom (zoom toward cursor)
      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        // screen coordinates relative to canvas (CSS pixels)
        const screenX = e.clientX - rect.left;
        const screenY = e.clientY - rect.top;

        // world coordinates before zoom
        const worldBeforeX = (screenX - viewport.x) / viewport.zoom;
        const worldBeforeY = (screenY - viewport.y) / viewport.zoom;

        const zoomDelta = e.deltaY > 0 ? 0.9 : 1.1;
        viewport.zoom = Math.max(viewport.minZoom, Math.min(viewport.maxZoom, viewport.zoom * zoomDelta));

        // adjust viewport so the world point under the cursor stays under the cursor
        viewport.x = screenX - worldBeforeX * viewport.zoom;
        viewport.y = screenY - worldBeforeY * viewport.zoom;

        drawAll();
      });

      // Handle text size input updates
      let defaultTextSize = 16;

      // Text content / weight / alignment controls
      let defaultFontWeight = 'normal';
      let defaultTextAlign = 'left';

      // Color controls: wire up and manage selected/default values
      let strokeDefault = '#0066cc';
      let fillDefault = '#ffffff';
      let textDefault = '#000000';
    let defaultImageFit = 'cover';





      function drawGrid() {
        const gridSize = 50;
        const minX = -viewport.x / viewport.zoom;
        const minY = -viewport.y / viewport.zoom;
        const maxX = (canvas.width - viewport.x) / viewport.zoom;
        const maxY = (canvas.height - viewport.y) / viewport.zoom;

        ctx.strokeStyle = '#f0f0f0';
        ctx.lineWidth = 1 / viewport.zoom;

        // Draw vertical lines
        for (let x = Math.floor(minX / gridSize) * gridSize; x <= maxX; x += gridSize) {
          ctx.beginPath();
          ctx.moveTo(x, minY);
          ctx.lineTo(x, maxY);
          ctx.stroke();
        }

        // Draw horizontal lines
        for (let y = Math.floor(minY / gridSize) * gridSize; y <= maxY; y += gridSize) {
          ctx.beginPath();
          ctx.moveTo(minX, y);
          ctx.lineTo(maxX, y);
          ctx.stroke();
        }
      }

      function drawResizeHandles(shape) {
        if (!shape) return;
        const handles = getResizeHandles(shape);
        ctx.save();
        ctx.fillStyle = '#0066cc';
        handles.forEach(h => {
          ctx.beginPath();
          ctx.rect(h.x - HANDLE_SIZE/2, h.y - HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
          ctx.fill();
        });
        ctx.restore();
      }

      function getResizeHandles(shape) {
        // Normalize the rectangle so width/height are positive and return the 4 corners
        const left = Math.min(shape.x, shape.x + shape.w);
        const top = Math.min(shape.y, shape.y + shape.h);
        const width = Math.abs(shape.w);
        const height = Math.abs(shape.h);
        return [
          { x: left, y: top, corner: 'nw' },
          { x: left + width, y: top, corner: 'ne' },

      // Helper: draw rounded rectangle path supporting per-corner radii

    // Create color or gradient style from a paint spec (string or object)
    function resolvePaintStyle(paint, shape, kind) {
      if (!paint) return kind === 'stroke' ? '#000' : '#fff';
      if (typeof paint === 'string') return paint; // simple color
      // gradient object: { type: 'linear'|'radial', angle?, stops: [{offset,color}],
      // coords optional as fractions: x0,y0,x1,y1 for linear; cx,cy,r0,r1 for radial
      const bounds = getShapeBounds(shape);
      if (!bounds) return '#000';

      // Normalize stops to support >2 colors and missing offsets
      const stops = normalizeStops(paint);
      if (!stops || stops.length < 2) {
        // Fallback to first color or neutral if insufficient data
        const fallback = stops && stops[0] ? stops[0].color : (kind === 'stroke' ? '#000' : '#fff');
        return fallback;
      }

      if (paint.type === 'linear') {
        const g = createLinearGradientForBounds(bounds, paint);
        stops.forEach(st => g.addColorStop(st.offset, st.color));
        return g;
      } else if (paint.type === 'radial') {
        const g = createRadialGradientForBounds(bounds, paint);
        stops.forEach(st => g.addColorStop(st.offset, st.color));
        return g;
      }
      return '#000';
    }

    // Accept either explicit stops or a simple colors array and sort by offset
    function normalizeStops(spec) {
      let stops = [];
      if (Array.isArray(spec?.stops) && spec.stops.length > 0) {
        stops = spec.stops
          .map(s => ({ offset: clamp01(s.offset ?? 0), color: s.color }))
          .filter(s => typeof s.color === 'string' && s.color);
      } else if (Array.isArray(spec?.colors) && spec.colors.length > 0) {
        const n = spec.colors.length;
        stops = spec.colors
          .filter(c => typeof c === 'string' && c)
          .map((c, i) => ({ offset: n === 1 ? 0 : i / (n - 1), color: c }));
      }
      // Sort by offset ascending to ensure consistent gradient rendering
      stops.sort((a, b) => a.offset - b.offset);
      return stops;
    }

    function clamp01(v){ return Math.max(0, Math.min(1, v)); }

    // Return normalized bounds {x,y,w,h} with positive w/h
    function getShapeBounds(s){
      if (!s) return null;
      if (s.type === 'circle') {
        const left = Math.min(s.x, s.x + s.w);
        const top = Math.min(s.y, s.y + s.h);
        const w = Math.abs(s.w);
        const h = Math.abs(s.h);
        return { x: left, y: top, w, h };
      }
      const left = Math.min(s.x, s.x + (s.w || 0));
      const top = Math.min(s.y, s.y + (s.h || 0));
      const w = Math.abs(s.w || 0);
      const h = Math.abs(s.h || 0);
      return { x: left, y: top, w, h };
    }

    // Linear gradient helper for a shape's bounds
    function createLinearGradientForBounds(bounds, spec){
      const { x, y, w, h } = bounds;
      // If explicit fractional coords provided, use them
      if (['x0','y0','x1','y1'].every(k => spec.hasOwnProperty(k))) {
        const x0 = x + clamp01(spec.x0) * w;
        const y0 = y + clamp01(spec.y0) * h;
        const x1 = x + clamp01(spec.x1) * w;
        const y1 = y + clamp01(spec.y1) * h;
        return ctx.createLinearGradient(x0, y0, x1, y1);
      }
      // Otherwise derive from angle (degrees), default 0° → left→right
      const angleDeg = (spec.angle ?? 0);
      const theta = angleDeg * Math.PI / 180;
      const cx = x + w/2, cy = y + h/2;
      const rx = w/2, ry = h/2;
      const dx = Math.cos(theta) * rx;
      const dy = Math.sin(theta) * ry;
      return ctx.createLinearGradient(cx - dx, cy - dy, cx + dx, cy + dy);
    }

    // Radial gradient helper for a shape's bounds
    function createRadialGradientForBounds(bounds, spec){
      const { x, y, w, h } = bounds;
      const cx = x + clamp01(spec.cx ?? 0.5) * w;
      const cy = y + clamp01(spec.cy ?? 0.5) * h;
      const r1 = (spec.r1 != null ? clamp01(spec.r1) : 0.5) * Math.min(w, h);
      const r0 = (spec.r0 != null ? clamp01(spec.r0) : 0.0) * Math.min(w, h);
      // Canvas radial uses two circles; keep same center for simple case
      return ctx.createRadialGradient(cx, cy, r0, cx, cy, r1);
    }


    function hexToRgb(hex) {
      hex = hex.replace("#", "");
     if (!/^[0-9a-fA-F]{6}$/.test(hex)) {
        return { r: 0, g: 0, b: 0 };
      }
      return {
        r: parseInt(hex.slice(0, 2), 16),
        g: parseInt(hex.slice(2, 4), 16),
        b: parseInt(hex.slice(4, 6), 16)
      };
    }

    function rgbToHex({ r, g, b }) {
      const toHex = (v) =>
        Math.max(0, Math.min(255, Math.round(v)))
          .toString(16)
          .padStart(2, "0");

      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    // ---- Shade Logic ----
    function shadeColor(hex, percent) {
      const { r, g, b } = hexToRgb(hex);

      const t = percent < 0 ? 0 : 255;
      const p = Math.abs(percent);

      return rgbToHex({
        r: (t - r) * p + r,
        g: (t - g) * p + g,
        b: (t - b) * p + b
      });
    }

    // ---- Generate Multiple Shades ----
    function generateShades(hex, steps = 5) {
      const shades = [];

      for (let i = -steps; i <= steps; i++) {
        if (i === 0) continue;
        shades.push(shadeColor(hex, i / (steps * 2)));
      }

      return shades;
    }


    function drawGraphInRect(ctx, s) {
    const x = Number.isFinite(s.x) ? s.x : 0;
    const y = Number.isFinite(s.y) ? s.y : 0;
    const w = Number.isFinite(s.w) ? s.w : 100;
    const h = Number.isFinite(s.h) ? s.h : 100;
    const graphType = s.graphType || "bar";
    const absW = Math.abs(w);
    const absH = Math.abs(h);

    // Some nice-looking arbitrary demo values
    const values = [12, 35, 25, 45, 30];
    const labels = ["A", "B", "C", "D", "E"];
    const colors = generateShades(s.strokeColor, 5); // ["#4e79a7", "#f28e2b", "#e15759", "#76b7b2", "#59a14f"];

    ctx.save();
    ctx.translate(x, y);

    if (graphType === "bar") {
      const maxVal = Math.max(...values);
      const barWidth = absW / values.length;

      values.forEach((val, i) => {
        const barHeight = (val / maxVal) * (absH * 0.8);
        const bx = i * barWidth + barWidth * 0.1;
        const by = absH - barHeight;
        ctx.fillStyle = colors[i % colors.length];
        ctx.fillRect(bx, by, barWidth * 0.8, barHeight);
      });
    }

    else if (graphType === "line") {
      const maxVal = Math.max(...values);
      const stepX = absW / (values.length - 1);
      ctx.beginPath();
      ctx.strokeStyle = colors[0];
      ctx.lineWidth = 2;

      values.forEach((val, i) => {
        const px = i * stepX;
        const py = absH - (val / maxVal) * absH * 0.8;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });

      ctx.stroke();
      ctx.closePath();

      // Draw small points
      ctx.fillStyle = colors[0];
      values.forEach((val, i) => {
        const px = i * stepX;
        const py = absH - (val / maxVal) * absH * 0.8;
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    else if (graphType === "pie") {
      const total = values.reduce((a, b) => a + b, 0);
      const cx = absW / 2;
      const cy = absH / 2;
      const radius = Math.min(absW, absH) / 2.5;
      let startAngle = 0;

      values.forEach((val, i) => {
        const sliceAngle = (val / total) * 2 * Math.PI;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, startAngle + sliceAngle);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        startAngle += sliceAngle;
      });
    }

    ctx.restore();
    }

      // Helper: draw an image into a rect with different fit modes
      function drawImageFit(ctx, img, dx, dy, dWidth, dHeight, fit, tintColor = '#f00', tintOpacity = 0.5) {
         if (!img || !img.complete || !img.naturalWidth) return;

          const sw = img.naturalWidth;
          const sh = img.naturalHeight;
          let sx = 0, sy = 0, sWidth = sw, sHeight = sh;
          let drawDx = dx, drawDy = dy, drawWidth = dWidth, drawHeight = dHeight;

          // Fit modes
          if (fit === 'cover') {
            const scale = Math.max(dWidth / sw, dHeight / sh);
            sWidth = dWidth / scale;
            sHeight = dHeight / scale;
            sx = (sw - sWidth) / 2;
            sy = (sh - sHeight) / 2;
          } else if (fit === 'contain') {
            const scale = Math.min(dWidth / sw, dHeight / sh);
            drawWidth = sw * scale;
            drawHeight = sh * scale;
            drawDx = dx + (dWidth - drawWidth) / 2;
            drawDy = dy + (dHeight - drawHeight) / 2;
          } else if (fit === 'none') {
            drawWidth = sw;
            drawHeight = sh;
          }

          if (!tintColor) {
            // No tint, draw directly
            ctx.drawImage(img, sx, sy, sWidth, sHeight, drawDx, drawDy, drawWidth, drawHeight);
            return;
          }

          // Create offscreen canvas
          const off = document.createElement('canvas');
          off.width = drawWidth;
          off.height = drawHeight;
          const offCtx = off.getContext('2d');

          // Draw image onto offscreen canvas
          offCtx.drawImage(img, sx, sy, sWidth, sHeight, 0, 0, drawWidth, drawHeight);

          // Apply tint using 'source-in' — affects only image pixels
          offCtx.fillStyle = tintColor;
          offCtx.globalCompositeOperation = 'source-in';
          offCtx.fillRect(0, 0, drawWidth, drawHeight);

          // Draw tinted image back to main canvas
          ctx.drawImage(off, drawDx, drawDy);
      }

        const arr = zOrder.map(id => shapesMap.get(id));
        for (let i = arr.length - 1; i >= 0; i--) {
          const s = arr[i];
          if (s.type === "rect") {
            const minX = Math.min(s.x, s.x + s.w);
            const maxX = Math.max(s.x, s.x + s.w);
            const minY = Math.min(s.y, s.y + s.h);
            const maxY = Math.max(s.y, s.y + s.h);
            if (x >= minX && x <= maxX && y >= minY && y <= maxY) return s;
          } else if (s.type === "circle") {
            // Match circle drawing logic: center is bbox midpoint, radius based on max dimension
            const r = Math.max(Math.abs(s.w), Math.abs(s.h)) / 2;
            const centerX = s.x + s.w / 2;
            const centerY = s.y + s.h / 2;
            const dx = x - centerX, dy = y - centerY;
            if (Math.sqrt(dx * dx + dy * dy) <= r) return s;
          } else if (s.type === "text") {

          } else if (s.type === "image") {
            if (x >= s.x && x <= s.x + s.w && y >= s.y && y <= s.y + s.h)
              return s;
          }
        }
        return null;
      }
